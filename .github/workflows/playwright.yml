name: Playwright Tests

# Когда запускать: на push в main и на каждый Pull Request в main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # Машина, на которой всё бежит
    runs-on: ubuntu-latest
    # Защита от зависания — убить job через 30 минут
    timeout-minutes: 30

    steps:
      # 1. Скачать код репозитория на runner
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Установить Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Установить зависимости из package-lock.json (быстро и детерминированно)
      - name: Install dependencies
        run: npm ci

      # 4. Установить браузеры Playwright + системные либы (--with-deps)
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # 5. Прогнать тесты. env прокидывает секреты в process.env.
      #    Их же подхватит и Next.js, который Playwright поднимет через webServer.
      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx playwright test

      # 6. Сохранить HTML-репорт как артефакт — даже если тесты упали.
      - name: Upload report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
